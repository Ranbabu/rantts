<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chatbot (OpenRouter)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom scrollbar for chat area */
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .message-enter { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans text-gray-800">

    <header class="bg-white shadow-sm px-4 py-3 flex justify-between items-center z-10 relative">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-robot text-blue-600 text-xl"></i>
            <h1 class="text-lg font-semibold text-gray-800">AI Chat</h1>
        </div>
        <button id="settings-btn" class="p-2 text-gray-500 hover:text-blue-600 focus:outline-none transition-colors">
            <i class="fa-solid fa-sliders text-xl"></i>
        </button>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 pb-20">
        <div class="flex justify-start message-enter">
            <div class="bg-white border border-gray-200 text-gray-800 rounded-2xl rounded-tl-sm px-4 py-2 max-w-[85%] shadow-sm">
                नमस्ते! मैं आपका AI असिस्टेंट हूँ। कृपया सेटिंग्स (⚙️) में जाकर बस अपनी OpenRouter API Key डालें। मॉडल पहले से ही बेस्ट फ्री सर्वर पर सेट है।
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 p-3 sticky bottom-0">
        <form id="chat-form" class="flex gap-2 items-end max-w-3xl mx-auto">
            <div class="flex-1 bg-gray-100 rounded-2xl px-4 py-2 border border-gray-200 focus-within:border-blue-400 focus-within:ring-1 focus-within:ring-blue-400 transition-all">
                <textarea id="user-input" rows="1" class="w-full bg-transparent outline-none resize-none max-h-32 text-gray-800" placeholder="Message AI..." required></textarea>
            </div>
            <button type="submit" id="send-btn" class="bg-blue-600 text-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-blue-700 transition-colors flex-shrink-0">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>
    </footer>

    <div id="settings-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-xl overflow-hidden animate-[fadeIn_0.2s_ease-out]">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                <h2 class="text-xl font-semibold flex items-center gap-2">
                    <i class="fa-solid fa-sliders text-blue-500"></i> Settings
                </h2>
                <button id="close-modal-btn" class="text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">OpenRouter API Key</label>
                    <input type="password" id="api-key" placeholder="sk-or-..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Model ID</label>
                    <input type="text" id="model-id" placeholder="openrouter/free" value="openrouter/free" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-gray-50">
                    <p class="text-xs text-green-600 mt-1 font-medium"><i class="fa-solid fa-check-circle"></i> Default: openrouter/free (ऑटो-राउटर, कभी फेल नहीं होगा)</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">System Prompt</label>
                    <textarea id="system-prompt" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">You are a helpful AI assistant.</textarea>
                </div>
            </div>

            <div class="px-6 py-4 bg-gray-50 flex justify-end gap-3 rounded-b-2xl">
                <button id="cancel-btn" class="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded-lg font-medium transition-colors">Cancel</button>
                <button id="save-btn" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition-colors shadow-sm">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        const saveBtn = document.getElementById('save-btn');
        
        // Setting Inputs
        const apiKeyInput = document.getElementById('api-key');
        const modelIdInput = document.getElementById('model-id');
        const systemPromptInput = document.getElementById('system-prompt');

        // Chat History Array
        let chatHistory = [];

        // Load Settings from LocalStorage on load
        window.addEventListener('DOMContentLoaded', () => {
            apiKeyInput.value = localStorage.getItem('or_api_key') || '';
            // मॉडल अब हमेशा डिफ़ॉल्ट रूप से 'openrouter/free' रहेगा 
            modelIdInput.value = localStorage.getItem('or_model_id') || 'openrouter/free';
            systemPromptInput.value = localStorage.getItem('or_system_prompt') || 'You are a helpful AI assistant.';
            
            // Set initial system prompt in history
            chatHistory.push({ role: "system", content: systemPromptInput.value });
        });

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if(this.value === '') this.style.height = 'auto';
        });

        // Enter key to send (Shift+Enter for new line)
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });

        // Modal Logic
        const openModal = () => settingsModal.classList.remove('hidden');
        const closeModal = () => settingsModal.classList.add('hidden');

        settingsBtn.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);

        // Save Settings
        saveBtn.addEventListener('click', () => {
            localStorage.setItem('or_api_key', apiKeyInput.value.trim());
            localStorage.setItem('or_model_id', modelIdInput.value.trim());
            localStorage.setItem('or_system_prompt', systemPromptInput.value.trim());
            
            // Update system prompt in history
            if(chatHistory.length > 0 && chatHistory[0].role === 'system') {
                chatHistory[0].content = systemPromptInput.value.trim();
            } else {
                chatHistory.unshift({ role: "system", content: systemPromptInput.value.trim() });
            }
            
            closeModal();
            // Settings save होने पर एक छोटा मैसेज 
            const Toast = document.createElement('div');
            Toast.className = 'fixed top-4 right-4 bg-green-500 text-white px-4 py-2 rounded shadow-lg transition-opacity duration-300';
            Toast.innerText = 'Settings Saved!';
            document.body.appendChild(Toast);
            setTimeout(() => { Toast.style.opacity = '0'; setTimeout(() => Toast.remove(), 300); }, 2000);
        });

        // Append Message to UI
        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} message-enter`;
            
            const innerDiv = document.createElement('div');
            if (role === 'user') {
                innerDiv.className = 'bg-blue-600 text-white rounded-2xl rounded-tr-sm px-4 py-2 max-w-[85%] shadow-sm whitespace-pre-wrap';
            } else {
                innerDiv.className = 'bg-white border border-gray-200 text-gray-800 rounded-2xl rounded-tl-sm px-4 py-2 max-w-[85%] shadow-sm whitespace-pre-wrap';
            }
            
            innerDiv.textContent = text;
            msgDiv.appendChild(innerDiv);
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Add loading indicator
        function addLoader() {
            const loaderDiv = document.createElement('div');
            loaderDiv.id = 'loading-indicator';
            loaderDiv.className = 'flex justify-start message-enter';
            loaderDiv.innerHTML = `
                <div class="bg-white border border-gray-200 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm flex gap-1 items-center">
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                </div>`;
            chatContainer.appendChild(loaderDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeLoader() {
            const loader = document.getElementById('loading-indicator');
            if (loader) loader.remove();
        }

        // Handle Chat Submit
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            const apiKey = localStorage.getItem('or_api_key');
            if (!apiKey) {
                alert("Please add your OpenRouter API Key in Settings first.");
                openModal();
                return;
            }

            // UI Updates for User
            appendMessage('user', message);
            userInput.value = '';
            userInput.style.height = 'auto';
            addLoader();

            // Add to history
            chatHistory.push({ role: "user", content: message });

            const modelId = localStorage.getItem('or_model_id') || 'openrouter/free';

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "HTTP-Referer": window.location.href, // Required by OpenRouter
                        "X-Title": "My AI Studio", // Optional
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: modelId,
                        messages: chatHistory
                    })
                });

                removeLoader();

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || 'API Error');
                }

                const data = await response.json();
                const aiMessage = data.choices[0].message.content;
                
                appendMessage('ai', aiMessage);
                chatHistory.push({ role: "assistant", content: aiMessage });

            } catch (error) {
                removeLoader();
                appendMessage('ai', `❌ Error: ${error.message}`);
                chatHistory.pop(); // Remove the last user message from history so it doesn't get stuck
            }
        });
    </script>
</body>
</html>
