<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indian News Image Generator HD+</title>

<style>
*{box-sizing:border-box;font-family:system-ui}
body{
  margin:0;
  background:#020617;
  color:#e5e7eb;
}
.app{
  max-width:560px;
  margin:auto;
  padding:14px;
}
h1{
  text-align:center;
  font-size:22px;
}
input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #334155;
  background:#020617;
  color:#fff;
}
button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  border:2px solid #38bdf8;
  background:transparent;
  color:#38bdf8;
  font-size:16px;
  cursor:pointer;
  transition:.25s;
}
button:disabled{
  opacity:.6;
}
button:active{
  transform:scale(.96);
  background:#38bdf8;
  color:#020617;
}
.grid{
  display:grid;
  gap:16px;
  margin-top:16px;
}
.card{
  border-radius:16px;
  overflow:hidden;
  border:1px solid #1e293b;
}
.frame{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  background:#000;
  overflow:hidden;
}
.frame::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:var(--bg);
  background-size:cover;
  background-position:center;
  filter:blur(22px) brightness(.7);
  transform:scale(1.15);
}
.frame img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  z-index:1;
}
.download{
  padding:10px;
}
.download button{
  border-color:#22c55e;
  color:#22c55e;
}
.timer{
  text-align:center;
  margin-top:10px;
  font-size:14px;
  opacity:.8;
}
.footer{
  text-align:center;
  font-size:12px;
  opacity:.6;
  margin:16px 0 6px;
}
</style>
</head>

<body>
<div class="app">
<h1>📰 Indian News Image Generator (HD+)</h1>

<input id="query" placeholder="Example: Nitin Nabin BJP national news">

<button id="genBtn" onclick="startTimer()">Generate Images</button>
<div class="timer" id="timer"></div>

<div class="grid" id="grid"></div>

<div class="footer">
Face Safe • 16:9 • Enhance → Download HD
</div>
</div>

<script>
let countdown = 5;

function startTimer(){
  const q = query.value.trim();
  if(!q) return alert("Keyword डालें");

  genBtn.disabled = true;
  timer.textContent = "Processing... 5s";

  countdown = 5;
  const t = setInterval(()=>{
    countdown--;
    timer.textContent = "Processing... " + countdown + "s";

    if(countdown===0){
      clearInterval(t);
      timer.textContent = "";
      generateImages();
      genBtn.disabled = false;
    }
  },1000);
}

function generateImages(){
  grid.innerHTML="";

  const search = encodeURIComponent(query.value + " India news");
  const url = `https://www.google.com/search?tbm=isch&tbs=isz:l&q=${search}`;

  fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(url))
  .then(r=>r.text())
  .then(html=>{
    const doc = new DOMParser().parseFromString(html,"text/html");
    const imgs=[...doc.querySelectorAll("img")]
      .map(i=>i.src)
      .filter(s=>s.startsWith("http"))
      .slice(2,14);

    imgs.forEach(src=>{
      const card=document.createElement("div");
      card.className="card";

      const frame=document.createElement("div");
      frame.className="frame";
      frame.style.setProperty("--bg",`url(${src})`);

      const img=document.createElement("img");
      img.crossOrigin="anonymous";
      img.src=src;

      frame.appendChild(img);

      const down=document.createElement("div");
      down.className="download";

      const btn=document.createElement("button");
      btn.textContent="⬇ Enhance & Download HD";
      btn.onclick=()=>enhanceAndDownload(img);

      down.appendChild(btn);
      card.append(frame,down);
      grid.appendChild(card);
    });
  })
  .catch(()=>alert("Hosting पर upload करके चलाएँ"));
}

function enhanceAndDownload(img){
  const canvas=document.createElement("canvas");
  canvas.width=1920;
  canvas.height=1080;

  const ctx=canvas.getContext("2d");
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality="high";

  ctx.fillStyle="#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const ratio=Math.min(
    canvas.width/img.naturalWidth,
    canvas.height/img.naturalHeight
  );

  const w=img.naturalWidth*ratio;
  const h=img.naturalHeight*ratio;
  const x=(canvas.width-w)/2;
  const y=(canvas.height-h)/2;

  // draw base
  ctx.drawImage(img,x,y,w,h);

  // clarity & sharpen
  ctx.globalAlpha=0.25;
  ctx.drawImage(canvas,-1,0);
  ctx.drawImage(canvas,1,0);
  ctx.drawImage(canvas,0,-1);
  ctx.drawImage(canvas,0,1);
  ctx.globalAlpha=1;

  const a=document.createElement("a");
  a.download="news-image-HD-enhanced.jpg";
  a.href=canvas.toDataURL("image/jpeg",0.98);
  a.click();
}
</script>
</body>
</html>
