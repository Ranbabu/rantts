<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini TTS Studio - Aryan News</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background-color: #f4f6f8; margin: 0; padding: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; background: #ffffff; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { background: #4285f4; color: #fff; padding: 18px; text-align: center; font-size: 22px; font-weight: bold; }
        .content { padding: 20px; overflow-y: auto; flex: 1; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #333; font-weight: 600; }
        textarea, select, input { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; font-size: 15px; outline: none; }
        textarea:focus, input:focus { border-color: #4285f4; }
        textarea { height: 140px; resize: none; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; color: white; cursor: pointer; }
        .play-btn { background: #0f9d58; }
        .download-btn { background: #db4437; }
        button:disabled { background: #9aa0a6; cursor: not-allowed; }
        .loader { text-align: center; color: #4285f4; font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">Gemini Audio Studio</div>
        <div class="content">
            <div class="form-group">
                <label>न्यूज़ स्क्रिप्ट (Text):</label>
                <textarea id="textInput" placeholder="अपनी न्यूज़ स्क्रिप्ट यहाँ डालें..."></textarea>
            </div>
            <div class="form-group">
                <label>Google AI Studio API Key:</label>
                <input type="password" id="apiKey" placeholder="AIzaSy...">
            </div>
            <div class="form-group">
                <label>मॉडल चुनें:</label>
                <select id="modelSelect">
                    <option value="gemini-2.5-flash">Gemini 2.5 Flash (Fast & Free)</option>
                    <option value="gemini-3.1-flash">Gemini 3.1 Flash (High Quality)</option>
                </select>
            </div>
            <div class="form-group">
                <label>आवाज़ (Voice):</label>
                <select id="voiceSelect">
                    <option value="Aoede">Aoede</option>
                    <option value="Puck">Puck</option>
                    <option value="Charon">Charon</option>
                    <option value="Kore">Kore</option>
                    <option value="Fenrir">Fenrir</option>
                </select>
            </div>

            <div id="loadingText" class="loader">ऑडियो बन रहा है, कृपया प्रतीक्षा करें...</div>

            <div class="btn-group">
                <button id="actionBtn" class="play-btn" onclick="generateAudio()">▶ Play</button>
                <button id="dlBtn" class="download-btn" onclick="downloadAudio()">⬇ Download</button>
            </div>
            <audio id="audioPlayer" controls style="width: 100%; margin-top: 20px; display: none;"></audio>
        </div>
    </div>

    <script>
        let currentAudioBlob = null;

        async function generateAudio() {
            const text = document.getElementById('textInput').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            const model = document.getElementById('modelSelect').value;
            const voice = document.getElementById('voiceSelect').value;
            
            const actionBtn = document.getElementById('actionBtn');
            const loadingText = document.getElementById('loadingText');
            const audioPlayer = document.getElementById('audioPlayer');

            if (!text) { alert('टेक्स्ट डालें!'); return; }
            if (!apiKey) { alert('API Key डालना ज़रूरी है!'); return; }

            actionBtn.disabled = true;
            loadingText.style.display = 'block';
            audioPlayer.style.display = 'none';

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, apiKey, model, voice })
                });

                const result = await response.json();

                if (!response.ok) throw new Error(result.error || 'Server Error');

                const audioSrc = `data:${result.format};base64,${result.audio}`;
                const fetchResponse = await fetch(audioSrc);
                currentAudioBlob = await fetchResponse.blob();

                audioPlayer.src = audioSrc;
                audioPlayer.style.display = 'block';
                audioPlayer.play();
            } catch (error) {
                alert(`एरर: ${error.message}`);
            } finally {
                actionBtn.disabled = false;
                loadingText.style.display = 'none';
            }
        }

        function downloadAudio() {
            if (!currentAudioBlob) { alert('पहले Play दबाकर ऑडियो जनरेट करें!'); return; }
            const a = document.createElement('a');
            a.href = URL.createObjectURL(currentAudioBlob);
            a.download = `Gemini_Audio_${Date.now()}.ogg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
