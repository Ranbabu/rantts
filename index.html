<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indian News Image Generator HD</title>

<style>
*{box-sizing:border-box;font-family:system-ui,-apple-system}
body{
  margin:0;
  background:#020617;
  color:#e5e7eb;
}
.app{
  max-width:560px;
  margin:auto;
  padding:14px;
}
h1{
  text-align:center;
  font-size:22px;
  margin-bottom:12px;
}
input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #334155;
  background:#020617;
  color:#fff;
  font-size:15px;
}
button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  border:2px solid #38bdf8;
  background:transparent;
  color:#38bdf8;
  font-size:16px;
  cursor:pointer;
  transition:.25s;
}
button:active{
  transform:scale(.96);
  background:#38bdf8;
  color:#020617;
}
.grid{
  display:grid;
  gap:16px;
  margin-top:16px;
}
.card{
  border-radius:16px;
  overflow:hidden;
  border:1px solid #1e293b;
}
.frame{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  background:#000;
  overflow:hidden;
}
.frame::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:var(--bg);
  background-size:cover;
  background-position:center;
  filter:blur(22px) brightness(.7);
  transform:scale(1.15);
}
.frame img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  z-index:1;
}
.download{
  padding:10px;
  display: flex;
  gap: 10px;
}
.download button{
  width: 50%;
  border-color:#22c55e;
  color:#22c55e;
  margin-top: 0;
}
.footer{
  text-align:center;
  font-size:12px;
  opacity:.6;
  margin:16px 0 6px;
}
.loader{
  text-align:center;
  margin-top:10px;
  display:none;
}
</style>
</head>

<body>
<div class="app">
  <h1>📰 Indian News Image Generator (HD)</h1>

  <input id="query" placeholder="Example: Indigo DGCA action inspectors suspended">

  <button id="generateBtn" onclick="generateImages()">Generate Images</button>

  <div class="loader" id="loader">🔄 Images loading...</div>

  <div class="grid" id="grid"></div>

  <div class="footer">
    Google Image Based • Face Safe • 16:9 • HD Boost • Large Images
  </div>
</div>

<script>
const grid = document.getElementById("grid");
const loader = document.getElementById("loader");

function generateImages(){
  const q = document.getElementById("query").value.trim();
  if(!q){
    alert("Headline / keyword डालें");
    return;
  }

  const generateBtn = document.getElementById("generateBtn");
  generateBtn.disabled = true;
  startButtonTimer(generateBtn, 20, "Generate Images"); // Timer badha diya large load ke liye

  grid.innerHTML="";
  loader.style.display="block";

  // Better search for news images
  const search = encodeURIComponent(q + " India news site:news");
  const url = `https://www.google.com/search?tbm=isch&tbs=isz:l&q=${search}`;

  // Multiple proxies fallback
  const proxies = [
    "https://corsproxy.io/?",
    "https://api.codetabs.com/v1/proxy?quest=",
    "https://api.allorigins.win/raw?url=",
    "https://cors.lol/"
  ];

  let proxyIndex = 0;

  function tryFetch(){
    if(proxyIndex >= proxies.length){
      alert("Sab proxies fail ho gaye. Hosting par upload karke try karein (Vercel/Netlify free). Ya keyword English mein daalein.");
      loader.style.display="none";
      generateBtn.disabled = false;
      return;
    }

    const proxy = proxies[proxyIndex];
    fetch(proxy + encodeURIComponent(url))
      .then(r=>r.text())
      .then(html=>{
        parseAndDisplay(html);
      })
      .catch(err=>{
        console.error("Proxy failed:", proxy, err);
        proxyIndex++;
        tryFetch(); // Next proxy try karo
      });
  }

  tryFetch();
}

function parseAndDisplay(html){
  const doc = new DOMParser().parseFromString(html,"text/html");
  const links = [...doc.querySelectorAll('a[href^="/imgres?"]')];
  const imgs = links.map(link => {
    const href = link.getAttribute('href');
    const params = new URLSearchParams(href.substring(1));
    return params.get('imgurl');
  }).filter(Boolean).slice(0,12);

  if(imgs.length===0){
    alert("Images नहीं मिली, English keyword try karein jaise 'Indigo DGCA suspend inspectors'");
    return;
  }

  imgs.forEach(src=>{
    const card = document.createElement("div");
    card.className="card";

    const frame = document.createElement("div");
    frame.className="frame";
    frame.style.setProperty("--bg",`url(${src})`);

    const img = document.createElement("img");
    img.crossOrigin="anonymous";
    img.src = src;

    frame.appendChild(img);

    const down = document.createElement("div");
    down.className="download";

    const downloadBtn = document.createElement("button");
    downloadBtn.textContent = "⬇ Download HD";
    downloadBtn.onclick = () => {
      downloadBtn.disabled = true;
      startButtonTimer(downloadBtn, 6, "⬇ Download HD");
      downloadHD(img, false);
    };

    const enhanceBtn = document.createElement("button");
    enhanceBtn.textContent = "✨ Enhance & Download";
    enhanceBtn.onclick = () => {
      enhanceBtn.disabled = true;
      startButtonTimer(enhanceBtn, 6, "✨ Enhance & Download");
      downloadHD(img, true);
    };

    down.appendChild(downloadBtn);
    down.appendChild(enhanceBtn);

    card.append(frame,down);
    grid.appendChild(card);
  });

  loader.style.display="none";
}

function startButtonTimer(button, seconds, originalText) {
  let remaining = seconds;
  button.textContent = `Wait ${remaining}s`;
  const interval = setInterval(() => {
    remaining--;
    button.textContent = `Wait ${remaining}s`;
    if (remaining <= 0) {
      clearInterval(interval);
      button.textContent = originalText;
      button.disabled = false;
    }
  }, 1000);
}

function downloadHD(img, enhance = false){
  const canvas = document.createElement("canvas");
  canvas.width = 1280;
  canvas.height = 720;

  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";

  ctx.fillStyle = "#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const ratio = Math.min(
    canvas.width / img.naturalWidth,
    canvas.height / img.naturalHeight
  );

  const w = img.naturalWidth * ratio;
  const h = img.naturalHeight * ratio;
  const x = (canvas.width - w) / 2;
  const y = (canvas.height - h) / 2;

  ctx.drawImage(img, x, y, w, h);

  if (enhance) {
    ctx.filter = 'contrast(1.2) brightness(1.08) saturate(1.15)';
    ctx.drawImage(canvas, 0, 0);
    ctx.filter = 'none';

    ctx.globalAlpha = 0.4;
    ctx.drawImage(canvas, -2, 0);
    ctx.drawImage(canvas, 2, 0);
    ctx.drawImage(canvas, 0, -2);
    ctx.drawImage(canvas, 0, 2);
    ctx.globalAlpha = 1;
  } else {
    ctx.globalAlpha = 0.2;
    ctx.drawImage(canvas, -1, 0);
    ctx.drawImage(canvas, 1, 0);
    ctx.drawImage(canvas, 0, -1);
    ctx.drawImage(canvas, 0, 1);
    ctx.globalAlpha = 1;
  }

  const a = document.createElement("a");
  a.download = "news-image-16x9-HD.jpg";
  a.href = canvas.toDataURL("image/jpeg", 0.98);
  a.click();
}
</script>
</body>
</html>
