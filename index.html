<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indian News Image Generator HD</title>

<style>
*{box-sizing:border-box;font-family:system-ui,-apple-system}
body{
  margin:0;
  background:#020617;
  color:#e5e7eb;
}
.app{
  max-width:560px;
  margin:auto;
  padding:14px;
}
h1{
  text-align:center;
  font-size:22px;
  margin-bottom:12px;
}
input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #334155;
  background:#020617;
  color:#fff;
  font-size:15px;
}
button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  border:2px solid #38bdf8;
  background:transparent;
  color:#38bdf8;
  font-size:16px;
  cursor:pointer;
  transition:.25s;
}
button:active{
  transform:scale(.96);
  background:#38bdf8;
  color:#020617;
}
.grid{
  display:grid;
  gap:16px;
  margin-top:16px;
}
.card{
  border-radius:16px;
  overflow:hidden;
  border:1px solid #1e293b;
}
.frame{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  background:#000;
  overflow:hidden;
}
.frame::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:var(--bg);
  background-size:cover;
  background-position:center;
  filter:blur(22px) brightness(.7);
  transform:scale(1.15);
}
.frame img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain; /* 🔥 FACE SAFE */
  z-index:1;
}
.download{
  padding:10px;
}
.download button{
  border-color:#22c55e;
  color:#22c55e;
}
.footer{
  text-align:center;
  font-size:12px;
  opacity:.6;
  margin:16px 0 6px;
}
.loader{
  text-align:center;
  margin-top:10px;
  display:none;
}
</style>
</head>

<body>
<div class="app">
  <h1>📰 Indian News Image Generator (HD)</h1>

  <input id="query" placeholder="Example: Nitin Nabin BJP national news">

  <button onclick="generateImages()">Generate Images</button>

  <div class="loader" id="loader">🔄 Images loading...</div>

  <div class="grid" id="grid"></div>

  <div class="footer">
    Google Image Based • Face Safe • 16:9 • HD Boost
  </div>
</div>

<script>
function generateImages(){
  const q = document.getElementById("query").value.trim();
  if(!q){
    alert("Headline / keyword डालें");
    return;
  }

  grid.innerHTML="";
  loader.style.display="block";

  const search = encodeURIComponent(q + " India news");
  const url = `https://www.google.com/search?tbm=isch&tbs=isz:l&q=${search}`;

  fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(url))
    .then(r=>r.text())
    .then(html=>{
      const doc = new DOMParser().parseFromString(html,"text/html");
      const imgs = [...doc.querySelectorAll("img")]
        .map(i=>i.src)
        .filter(s=>s.startsWith("http"))
        .slice(2,14); // 12 images

      if(imgs.length===0){
        alert("Images नहीं मिली, keyword बदलें");
        return;
      }

      imgs.forEach(src=>{
        const card = document.createElement("div");
        card.className="card";

        const frame = document.createElement("div");
        frame.className="frame";
        frame.style.setProperty("--bg",`url(${src})`);

        const img = document.createElement("img");
        img.crossOrigin="anonymous";
        img.src = src;

        frame.appendChild(img);

        const down = document.createElement("div");
        down.className="download";

        const btn = document.createElement("button");
        btn.textContent = "⬇ Download HD 16:9 Image";
        btn.onclick = ()=>downloadHD(img);

        down.appendChild(btn);

        card.append(frame,down);
        grid.appendChild(card);
      });
    })
    .catch(()=>{
      alert("Local file block ho sakta hai — hosting par upload karein");
    })
    .finally(()=>{
      loader.style.display="none";
    });
}

function downloadHD(img){
  const canvas = document.createElement("canvas");
  canvas.width = 1280;
  canvas.height = 720;

  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";

  // background
  ctx.fillStyle = "#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // scale
  const ratio = Math.min(
    canvas.width / img.naturalWidth,
    canvas.height / img.naturalHeight
  );

  const w = img.naturalWidth * ratio;
  const h = img.naturalHeight * ratio;
  const x = (canvas.width - w) / 2;
  const y = (canvas.height - h) / 2;

  ctx.drawImage(img, x, y, w, h);

  // light sharpening
  ctx.globalAlpha = 0.18;
  ctx.drawImage(canvas, -1, 0);
  ctx.drawImage(canvas, 1, 0);
  ctx.drawImage(canvas, 0, -1);
  ctx.drawImage(canvas, 0, 1);
  ctx.globalAlpha = 1;

  const a = document.createElement("a");
  a.download = "news-image-16x9-HD.jpg";
  a.href = canvas.toDataURL("image/jpeg", 0.98);
  a.click();
}
</script>
</body>
</html>
